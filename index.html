<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/style.css" />
    <title>Cointoss</title>
  </head>
  <body>
    <div>
      <h1>Head or Tail</h1>
      <button id="head" onclick="coinToss()">Head</button>
      <button id="tail" onclick="coinToss()">Tail</button>
      <div style="display: flex; grid-gap: 1em">
        <p>Your Choice:</p>
        <p id="userChoice"></p>
      </div>
      <div style="display: flex; grid-gap: 1em">
        <p>Computer Choice:</p>
        <p id="compChoice"></p>
      </div>
      <div style="display: flex; grid-gap: 1em">
        <p>Answer is:</p>
        <p id="answer"></p>
      </div>
      <p id="winner"></p>
    </div>
    <script src="assets/main.js"></script>
  </body>
</html>
